<!DOCTYPE html>
<html>
  <head>
    <title>Nexorium Haritası</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js" type="text/javascript"></script>
    <style>
      /* Arka plan siyah ve genel stil */
      html, body, #map { 
        width: 100%; 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        background-color: #000000 !important; 
      }
      /* Koordinat kutusu (Popup) stili */
      .leaflet-popup-content-wrapper {
        background: #1a1a1a !important;
        color: #ffffff !important;
        border: 1px solid #ffcc00;
        border-radius: 5px;
        font-family: sans-serif;
      }
      .leaflet-popup-tip {
        background: #1a1a1a !important;
        border: 1px solid #ffcc00;
      }
      .custom-popup b { color: #ffcc00; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="text/javascript">
      var mapMinZoom = 0;
      var mapMaxZoom = 5;
      
      var map = new L.Map('map', {
          maxZoom: mapMaxZoom,
          minZoom: mapMinZoom,
          crs: L.CRS.Simple
      });

      var layer = L.tileLayer('{z}/{x}/{y}.png', {
          minZoom: mapMinZoom, 
          maxZoom: mapMaxZoom,
          tileSize: 512,
          noWrap: true
      }).addTo(map);

      // Haritayı başlangıçta ortalar
      map.setView([-100, 150], 2);

      // --- OYUNCULAR İÇİN KOORDİNAT HESAPLAYICI ---
      map.on('click', function(e) {
          var lat = e.latlng.lat;
          var lng = e.latlng.lng;

          // MCASelector'dan aldığımız başlangıç noktaları
          var baslangicX = 17408;
          var baslangicZ = 10752;

          // Harita piksellerini oyun koordinatına çevirme
          var oyunX = Math.round(lng + baslangicX);
          var oyunZ = Math.round(baslangicZ - lat); 

          var icerik = "<div class='custom-popup'>" +
                       "<b>NEXORIUM DÜNYASI</b><br>" +
                       "<hr style='border:0.5px solid #444'>" +
                       "X: " + oyunX + " | Z: " + oyunZ + "<br>" +
                       "<small style='color:#888'>Komut: /tp " + oyunX + " 70 " + oyunZ + "</small>" +
                       "</div>";

          L.popup()
              .setLatLng(e.latlng)
              .setContent(icerik)
              .openOn(map);
          
          // Konsola da yazdıralım (Geliştirici için)
          console.log("Tıklanan Piksel: " + lat + ", " + lng);
      });
    </script>
  </body>
</html>
