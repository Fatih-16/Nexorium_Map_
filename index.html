<!DOCTYPE html>
<html>
  <head>
    <title>Nexorium Haritası</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <style>
      html, body, #map { width:100%; height:100%; margin:0; padding:0; background-color:#000; }
      .leaflet-popup-content-wrapper {
        background:#1a1a1a !important;
        color:white !important;
        border:2px solid #ffcc00;
        border-radius:8px;
        box-shadow:0 0 15px rgba(255,204,0,0.4);
      }
      .leaflet-popup-tip { background:#1a1a1a !important; border:1px solid #ffcc00; }
      .custom-popup { text-align:center; font-family:'Segoe UI',sans-serif; }
      .custom-popup b { color:#ffcc00; font-size:16px; text-transform:uppercase; }
      .tp-cmd { 
        background:#333; 
        padding:5px; 
        border-radius:4px; 
        color:#00ff00; 
        font-family:monospace; 
        display:block;
        margin-top:8px;
        border:1px solid #444;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="text/javascript">

      // --- HARİTA BOYUTLARI ---
      var minX = 17408;
      var minZ = 10752;
      var maxX = 25723;
      var maxZ = 15359;

      var mapWidth = maxX - minX;   // 8315
      var mapHeight = maxZ - minZ;  // 4607

      // Minecraft gibi alt yukarı artması için düz CRS
      var nexoriumCRS = L.extend({}, L.CRS.Simple, {
          transformation: new L.Transformation(1, 0, 1, 0)
      });

      var map = new L.Map('map', {
          maxZoom: 5,
          minZoom: 0,
          crs: nexoriumCRS
      });

      // --- TILE LAYER ---
      var layer = L.tileLayer('{z}/{x}/{y}.png', { // GitHub Pages için relative path
          minZoom:0,
          maxZoom:5,
          tileSize:512,
          noWrap:true
      }).addTo(map);

      // Harita sınırlarını ayarla
      var bounds = [[0,0], [mapHeight, mapWidth]];
      map.fitBounds(bounds);

      // --- TIKLAMA KOORDİNAT HESABI ---
      map.on('click', function(e) {
          var relativeX = e.latlng.lng;
          var relativeZ = e.latlng.lat;

          var oyunX = Math.round(minX + relativeX);
          var oyunZ = Math.round(minZ + relativeZ);

          var icerik = "<div class='custom-popup'>" +
                       "<b>NEXORIUM NAVİGASYON</b><br>" +
                       "<div style='margin:5px 0; border-top:1px dashed #555;'></div>" +
                       "X: " + oyunX + " | Z: " + oyunZ + "<br>" +
                       "<span class='tp-cmd'>/tp " + oyunX + " 70 " + oyunZ + "</span>" +
                       "</div>";

          L.popup().setLatLng(e.latlng).setContent(icerik).openOn(map);
      });

    </script>
  </body>
</html>
