<!DOCTYPE html>
<html>
  <head>
    <title>Nexorium Haritası</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js" type="text/javascript"></script>
    <style>
      /* Arka plan tamamen siyah */
      html, body, #map { width:100%; height:100%; margin:0; padding:0; background-color: #000000 !important; }
      
      /* Nexorium Temalı Siyah-Altın Popup */
      .leaflet-popup-content-wrapper {
        background: #1a1a1a !important;
        color: white !important;
        border: 2px solid #ffcc00;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
      }
      .leaflet-popup-tip { background: #1a1a1a !important; border: 1px solid #ffcc00; }
      .custom-popup { text-align: center; font-family: 'Segoe UI', sans-serif; }
      .custom-popup b { color: #ffcc00; font-size: 16px; text-transform: uppercase; }
      .tp-cmd { 
        background: #333; 
        padding: 5px; 
        border-radius: 4px; 
        color: #00ff00; 
        font-family: monospace; 
        display: block; 
        margin-top: 8px;
        border: 1px solid #444;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="text/javascript">
      // 1. Koordinat sistemini Minecraft Z yönüyle eşitliyoruz
      var nexoriumCRS = L.extend({}, L.CRS.Simple, {
          transformation: new L.Transformation(1, 0, 1, 0) // Y eksenini aşağı doğru artacak şekilde çevirir
      });

      var map = new L.Map('map', {
          maxZoom: 5,
          minZoom: 0,
          crs: nexoriumCRS
      });

      var layer = L.tileLayer('{z}/{x}/{y}.png', {
          minZoom: 0, 
          maxZoom: 5,
          tileSize: 512,
          noWrap: true
      }).addTo(map);

      // Haritayı yaklaşık merkeze odakla
      map.setView([150, 200], 2);

      // --- NEXORIUM KESİN HESAPLAMA ---
      map.on('click', function(e) {
          var y = e.latlng.lat; // Dikey (Z)
          var x = e.latlng.lng; // Yatay (X)

          // Senin MCASelector'dan verdiğin SOL ÜST koordinatlar
          var baslangicX = 17408;
          var baslangicZ = 10752;

          // Matematiksel Senkronizasyon (Piksel -> Blok)
          var oyunX = Math.round(x + baslangicX);
          var oyunZ = Math.round(y + baslangicZ); 

          var icerik = "<div class='custom-popup'>" +
                       "<b>NEXORIUM NAVİGASYON</b><br>" +
                       "<div style='margin:5px 0; border-top:1px dashed #555;'></div>" +
                       "X: " + oyunX + " | Z: " + oyunZ + "<br>" +
                       "<span class='tp-cmd'>/tp " + oyunX + " 70 " + oyunZ + "</span>" +
                       "</div>";

          L.popup().setLatLng(e.latlng).setContent(icerik).openOn(map);
      });
    </script>
  </body>
</html>
