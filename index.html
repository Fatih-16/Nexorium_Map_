<!DOCTYPE html>
<html>
  <head>
    <title>SaltanatCraft Haritası</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js" type="text/javascript"></script>
    <style>
      /* Burası harita dışındaki her yeri siyah yapar */
      html, body, #map { 
        width: 100%; 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        background-color: #000000 !important; 
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="text/javascript">
      var mapMinZoom = 0;
      var mapMaxZoom = 5;
      
      var map = new L.Map('map', {
          maxZoom: mapMaxZoom,
          minZoom: mapMinZoom,
          crs: L.CRS.Simple
      });

      var layer = L.tileLayer('{z}/{x}/{y}.png', {
          minZoom: mapMinZoom, 
          maxZoom: mapMaxZoom,
          tileSize: 512,
          noWrap: true
      }).addTo(map);

      // Haritayı başlangıçta ortalar
      map.setView([-100, 150], 2);
    </script>
  </body>
</html>
